<div class="container" style="padding-top: 110px; max-width: 500px;">
  <h2 class="mb-4">Register</h2>
  <form (ngSubmit)="register()">
    <div class="mb-3">
      <label class="form-label">Full Name *</label>
      <input type="text" class="form-control" [(ngModel)]="name" name="name" required placeholder="Enter your full name">
    </div>
    <div class="mb-3">
      <label class="form-label">Email *</label>
      <input type="email" class="form-control" [(ngModel)]="email" name="email" required placeholder="Enter your email">
    </div>
    <div class="mb-3">
      <label class="form-label">Password *</label>
      <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="Enter your password">
    </div>
    <button type="submit" class="btn btn-custom-primary">Register</button>
    <p class="mt-3 text-muted">Already have an account? <a routerLink="/login">Login here</a></p>
  </form>
</div>
