<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Book Appointment - Bharti Vidyapeeth Hospital</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-heart-pulse text-danger me-2"></i>BV Hospital
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="departments.html">Departments</a></li>
          <li class="nav-item"><a class="nav-link" href="doctors.html">Doctors</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="appointments.html">My Appointments</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item ms-lg-3">
            <a href="appointment.html" class="btn btn-custom-primary btn-sm rounded-pill px-4">Book Appointment</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top:110px; max-width:800px;">
    <h2 class="mb-4">Book an Appointment</h2>

    <form id="appointmentForm" novalidate>
      <div class="mb-3">
        <label for="name" class="form-label">Full Name *</label>
        <input id="name" name="name" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email *</label>
        <input id="email" name="email" type="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number *</label>
        <input id="phone" name="phone" type="tel" class="form-control" required placeholder="10 digits">
      </div>

      <div class="mb-3">
        <label class="form-label">Gender</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="g-male" value="Male" checked>
          <label class="form-check-label" for="g-male">Male</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="g-female" value="Female">
          <label class="form-check-label" for="g-female">Female</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="gender" id="g-other" value="Other">
          <label class="form-check-label" for="g-other">Other</label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Preferred Consultation Days</label>
        <div class="bg-light p-3 rounded">
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="days" value="Monday" id="dayMon"><label class="form-check-label" for="dayMon">Mon</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="days" value="Tuesday" id="dayTue"><label class="form-check-label" for="dayTue">Tue</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="days" value="Wednesday" id="dayWed"><label class="form-check-label" for="dayWed">Wed</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="days" value="Thursday" id="dayThu"><label class="form-check-label" for="dayThu">Thu</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="days" value="Friday" id="dayFri"><label class="form-check-label" for="dayFri">Fri</label></div>
          <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="days" value="Saturday" id="daySat"><label class="form-check-label" for="daySat">Sat</label></div>
        </div>
      </div>

      <div class="mb-3">
        <label for="subject" class="form-label">Subject</label>
        <select id="subject" name="subject" class="form-select">
          <option value="appointment">Book an Appointment</option>
          <option value="inquiry">General Inquiry</option>
          <option value="feedback">Feedback</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea id="message" name="message" rows="4" class="form-control"></textarea>
      </div>

      <div class="mb-3">
        <button id="submitBtn" class="btn btn-primary" type="submit">Submit Appointment</button>
        <a href="appointments.html" class="btn btn-outline-secondary ms-2">View My Appointments</a>
      </div>

      <div id="status" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
  <script src="appointment.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
